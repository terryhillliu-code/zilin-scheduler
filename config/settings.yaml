system:
  name: "知微定时任务系统"
  version: "3.0.0"
  timezone: "Asia/Shanghai"
  log_dir: "logs"
  output_dir: "outputs"
  log_retention_days: 30

push:
  dingtalk:
    enabled: true
    webhook: "https://oapi.dingtalk.com/robot/send?access_token=6a671d42464224cfe0b40a2183ea94fd433274e5054d1aa1db84490012d1a772"
    secret: "SECa28c2e8ed7cb542316e19155dc8183012ad73a9b123061f4a378eb043b044e00"
  feishu:
    enabled: true
    app_id: "cli_a917bc583a78dbcc"
    app_secret: "n65Xj21PgP4DvtmUYE3kedKGZHOZLdb5"
    chat_id: "oc_cba5528a321ac0f77de4190390cecf9f"

quiet_hours:
  enabled: true
  start: "23:00"
  end: "06:30"

jobs:
  # ============ 每日简报 ============
  morning_brief:
    enabled: true
    hour: 9
    minute: 30
    day_of_week: "mon-sun"
    description: "每日早报"
    push_to: ["dingtalk", "feishu"]

  noon_brief:
    enabled: true
    hour: 14
    minute: 30
    day_of_week: "mon-sun"
    description: "每日午报"
    push_to: ["dingtalk", "feishu"]

  # ============ 美股信息 ============
  us_market_close:
    enabled: true
    hour: 8
    minute: 0
    day_of_week: "tue-sat"
    description: "美股收盘复盘"
    push_to: ["dingtalk", "feishu"]
    retry: { max_attempts: 3, delay_seconds: 120 }

  us_market_open:
    enabled: true
    hour: 21
    minute: 0
    day_of_week: "mon-fri"
    description: "美股开盘播报"
    push_to: ["dingtalk", "feishu"]
    retry: { max_attempts: 3, delay_seconds: 120 }

  # ============ 系统维护 ============
  system_check:
    enabled: true
    hour: 6
    minute: 30
    day_of_week: "mon-sun"
    description: "系统巡检"
    push_to: ["dingtalk", "feishu"]
    retry: { max_attempts: 2, delay_seconds: 30 }

  system_metrics:
    enabled: true
    hour: 10
    minute: 35
    day_of_week: "mon-sun"
    description: "运维指标报告"
    push_to: ["dingtalk"]
    retry: { max_attempts: 2, delay_seconds: 30 }

  log_rotate:
    enabled: true
    hour: 3
    minute: 0
    day_of_week: "mon-sun"
    description: "日志滚动（10MB/5版本）"
    push_to: []

  # ============ 知识管理 ============
  knowledge_classify:
    enabled: true
    hour: 23
    minute: 0
    day_of_week: "mon-sun"
    description: "知识管线分类"
    push_to: []

  vault_sync_master:
    enabled: true
    hour: 3
    minute: 0
    day_of_week: "mon-sun"
    description: "VaultSyncMaster - 全库笔记自愈与双库对齐 (V4.4)"
    push_to: ["feishu"]
    retry: { max_attempts: 1, delay_seconds: 120 }

  # ============ 视频处理 ============
  video_retry:
    enabled: true
    hour: 6
    minute: 0
    day_of_week: "mon-sun"
    description: "重试失败的视频处理任务"
    push_to: []
    retry: { max_attempts: 1, delay_seconds: 30 }

  # ============ 健康检查 ============
  asr_health_check:
    enabled: true
    hour: 12
    minute: 0
    day_of_week: "mon-sun"
    description: "ASR 服务健康检查"
    push_to: []
    retry: { max_attempts: 1, delay_seconds: 30 }

  douyin_health_check:  # ⭐ v64.0 新增
    enabled: true
    hour: "*/2"  # 每2小时检查一次
    minute: 0
    day_of_week: "mon-sun"
    description: "Douyin API 健康检查（自动重启）"
    push_to: []
    retry: { max_attempts: 1, delay_seconds: 30 }

  # ============ 语音任务 ============
  daily_voice_task_summary:
    enabled: true
    hour: 20
    minute: 0
    day_of_week: "mon-sun"
    description: "每日语音任务汇总"
    push_to: []
    retry: { max_attempts: 2, delay_seconds: 60 }

  # ============ 情报中心 (v5.5) ============
  intelligence_sync:
    enabled: true
    hour: 10
    minute: 0
    day_of_week: "mon-sun"
    description: "智微情报中心自动化同步 (v5.5)"
    push_to: []

  intelligence_report:
    enabled: true
    hour: 8
    minute: 30
    day_of_week: "mon"
    description: "每周情报深度简报 (v5.5)"
    push_to: ["feishu"]

  # ============ 信息源同步 (v62.0) ============
  sync_hn_daily:
    enabled: true
    hour: 8
    minute: 5  # ⭐ v65.0 调整：避开 us_market_close
    day_of_week: "mon-sun"
    description: "同步 Hacker News Top 5 到 Obsidian Inbox"
    push_to: []
    retry: { max_attempts: 2, delay_seconds: 60 }

  sync_github_weekly:
    enabled: true
    hour: 8
    minute: 35  # ⭐ v65.0 调整：避开 intelligence_report
    day_of_week: "mon"
    description: "每周同步 GitHub Trending (AI) 到 Obsidian Inbox"
    push_to: []
    retry: { max_attempts: 2, delay_seconds: 60 }

  # ============ 论文精选 (v65.0 恢复) ============
  arxiv_papers:
    enabled: true
    hour: 7
    minute: 0
    day_of_week: "mon-sun"
    description: "arXiv 论文精选（LLM+工具）"
    push_to: ["feishu"]
    retry: { max_attempts: 2, delay_seconds: 60 }

  # ============ 视频笔记整理 (v65.0 恢复) ============
  video_notes_organize:
    enabled: true
    hour: 4
    minute: 0
    day_of_week: "mon-sun"
    description: "视频笔记整理（归档+分类+重命名+索引）"
    push_to: []
    retry: { max_attempts: 1, delay_seconds: 30 }

  # ============ 播客更新 (v65.0 新增) ============
  podcast_update:
    enabled: true
    hour: 18
    minute: 0
    day_of_week: "mon-sun"
    description: "播客更新检查与下载"
    push_to: ["feishu"]
    retry: { max_attempts: 2, delay_seconds: 60 }

